<!DOCTYPE html>
<html>
<head>
    <title>Digital Bank</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 300px; margin: 50px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .balance { font-size: 24px; color: green; font-weight: bold; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Abitha's Digital Bank</h2>
        <p>Account Balance</p>
        <div class="balance">$5,240.00</div>
        <br>
        <button>Transfer Money</button>
    </div>
</body>
</html>
